<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Upload documents and images to your Gnosis knowledge base." />
  <title>Gnosis — Upload</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    /* Quick style for the new multi-file list */
    .file-list-container { margin-top: 20px; width: 100%; }
    .file-row {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand"><span class="brand-icon">🔮</span> Gnosis</a>
  <div class="nav-links">
    <a href="/upload" class="active">Upload</a>
    <a href="/search">Search</a>
    <a href="/about">About</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-content">
    <div class="page-header animate-in">
      <h1>Upload Files</h1>
      <p>Add documents to your knowledge base for intelligent indexing.</p>
    </div>

    <div class="glass-card animate-in animate-in-delay-1">
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <div class="dropzone-icon">📄</div>
        <h3>Drop files here</h3>
        <p>or <span class="browse-link">browse</span> to choose files</p>
        <div class="file-types">
          <span class="file-type-badge">PDF</span> <span class="file-type-badge">DOCX</span>
          <span class="file-type-badge">PPTX</span> <span class="file-type-badge">TXT</span>
          <span class="file-type-badge">JPG</span> <span class="file-type-badge">PNG</span>
        </div>
      </div>

      <input type="file" id="fileInput" hidden accept=".jpg,.jpeg,.png,.pdf,.docx,.txt,.pptx" multiple />

      <div id="fileListContainer" class="file-list-container"></div>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text">
          <span id="progressLabel">Uploading...</span>
          <span id="progressPercent">0%</span>
        </div>
      </div>

      <div class="status-message" id="statusMsg"></div>

      <button class="btn btn-primary btn-full btn-lg" id="uploadBtn" onclick="uploadFile()" style="margin-top: 20px;">
        Upload Files
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileListContainer = document.getElementById('fileListContainer');
  const uploadBtn = document.getElementById('uploadBtn');
  const uploadProgress = document.getElementById('uploadProgress');
  const progressFill = document.getElementById('progressFill');
  const progressPercent = document.getElementById('progressPercent');
  const progressLabel = document.getElementById('progressLabel');
  const statusMsg = document.getElementById('statusMsg');

  const ALLOWED_TYPES = [
    'image/jpeg', 'image/png', 'application/pdf', 'text/plain',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.openxmlformats-officedocument.presentationml.presentation'
  ];

  const FILE_ICONS = {
    'application/pdf': '📕', 'text/plain': '📝', 'image/jpeg': '🖼️', 'image/png': '🖼️',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '📘',
    'application/vnd.openxmlformats-officedocument.presentationml.presentation': '📙'
  };

  let selectedFiles = [];

  // Drag & Drop Handlers
  ['dragenter', 'dragover'].forEach(evt => {
    dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  });

  ['dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('dragover'); });
  });

  dropzone.addEventListener('drop', e => {
    const files = Array.from(e.dataTransfer.files);
    if (files.length > 0) selectFiles(files);
  });

  fileInput.addEventListener('change', () => {
    const files = Array.from(fileInput.files);
    if (files.length > 0) selectFiles(files);
  });

  function selectFiles(newFiles) {
    for (let file of newFiles) {
      if (ALLOWED_TYPES.includes(file.type)) {
        if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
          selectedFiles.push(file);
        }
      } else {
        showToast(`Skipped ${file.name}: Unsupported type`, 'error');
      }
    }
    updateUI();
  }

  function updateUI() {
    fileListContainer.innerHTML = '';
    selectedFiles.forEach((file, index) => {
      const row = document.createElement('div');
      row.className = 'file-row animate-in';
      row.innerHTML = `
        <div style="font-size: 20px; margin-right: 12px;">${FILE_ICONS[file.type] || '📄'}</div>
        <div style="flex: 1; overflow: hidden;">
          <div style="text-overflow: ellipsis; white-space: nowrap; overflow: hidden; font-weight: 500;">${file.name}</div>
          <div style="font-size: 12px; opacity: 0.6;">${formatSize(file.size)}</div>
        </div>
        <button onclick="removeSpecificFile(${index})" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 18px;">✕</button>
      `;
      fileListContainer.appendChild(row);
    });
    hideStatus();
    uploadProgress.classList.remove('visible');
  }

  function removeSpecificFile(index) {
    selectedFiles.splice(index, 1);
    updateUI();
  }

  function removeFile() {
    selectedFiles = [];
    fileInput.value = '';
    updateUI();
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function showStatus(msg, type) {
    statusMsg.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
    statusMsg.className = 'status-message visible ' + type;
  }

  function hideStatus() { statusMsg.className = 'status-message'; }

  function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.className = 'toast', 3000);
  }

  async function uploadFile() {
    if (selectedFiles.length === 0) {
      showToast('Please select files first', 'error');
      return;
    }

    hideStatus();
    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<span class="spinner"></span> Uploading...';
    uploadProgress.classList.add('visible');

    const formData = new FormData();
    selectedFiles.forEach(file => {
      formData.append('files', file); // Matches backend 'files'
    });

    const xhr = new XMLHttpRequest();

    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        progressFill.style.width = pct + '%';
        progressPercent.textContent = pct + '%';
      }
    });

    xhr.addEventListener('load', () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) {
          progressFill.style.width = '100%';
          progressPercent.textContent = '100%';
          progressLabel.textContent = 'Complete';
          showStatus(`Uploaded ${selectedFiles.length} files successfully!`, 'success');
          showToast('Upload complete ✓', 'success');
          setTimeout(() => removeFile(), 3000);
        } else {
          const err = typeof data.detail === 'string' ? data.detail : (data.detail?.[0]?.msg || 'Upload failed');
          showStatus(err, 'error');
        }
      } catch (e) { showStatus('Server Error', 'error'); }
      resetBtn();
    });

    xhr.addEventListener('error', () => {
      showStatus('Network error', 'error');
      resetBtn();
    });

    xhr.open('POST', '/api/upload/file');
    xhr.send(formData);
  }

  function resetBtn() {
    uploadBtn.disabled = false;
    uploadBtn.textContent = 'Upload Files';
    uploadBtn.style.opacity = '1';
  }
</script>
</body>
</html>
